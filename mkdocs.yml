site_name: Domain API Docs
site_url: https://datagriff.github.io/domain-api-template/
docs_dir: docs
repo_url: https://github.com/dataGriff/domain-api-template
repo_name: dataGriff/domain-api-template

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight

nav:
  - Home: index.md
  - Specifications:
    - Product Requirements: specifications/prd.md
    - Domain Model: specifications/domain-model.md
    - Auth Matrix: specifications/auth-matrix.md
    - Sequence Diagrams: specifications/sequence-diagrams.md

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
