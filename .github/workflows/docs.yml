name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        run: sh -c "$(curl -L https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install datacontract-cli
        run: pip install datacontract-cli==0.12.1

      - name: Lint contracts
        run: task lint

  deploy:
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        run: sh -c "$(curl -L https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install mkdocs-material pyyaml

      - name: Generate domain overview
        run: task docs:generate

      - name: Deploy to GitHub Pages
        run: task docs:deploy
