  /v1/[resource1]:
    get:
      tags: ["[Resource1]"]
      summary: List [resource1]s
      description: TODO — describe what this returns and who can access it.
      operationId: list[Resource1]s
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of [resource1]s
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/[Resource1]'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: ["[Resource1]"]
      summary: Create a [resource1]
      description: TODO — describe what this creates and who can do it.
      operationId: create[Resource1]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Create[Resource1]Request'
      responses:
        '201':
          description: "[Resource1] created"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/[Resource1]'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /v1/[resource1]/{id}:
    get:
      tags: ["[Resource1]"]
      summary: Get a [resource1]
      description: TODO — describe ownership rules and who can access.
      operationId: get[Resource1]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: "[Resource1] found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/[Resource1]'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: ["[Resource1]"]
      summary: Update a [resource1]
      description: TODO — partial update.
      operationId: update[Resource1]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Update[Resource1]Request'
      responses:
        '200':
          description: "[Resource1] updated"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/[Resource1]'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
