openapi: 3.0.3
info:
  title: "[Domain Name] API"
  description: |
    > **Template placeholder.** Replace this file with your domain's OpenAPI contract.
    > Run `task domain:init` to copy this template, then edit the copy in `docs/specifications/contracts/`.

    REST API for the **[Domain Name]** domain.

    ## Authentication
    Most endpoints require a JWT bearer token. Obtain one via `POST /v1/auth/login`.
  version: 1.0.0
  contact:
    name: "[Your Name / Team]"
    email: "[your@email.com]"

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Auth
    description: Authentication — register, login, refresh, logout
  - name: "[Resource1]"
    description: "[Brief description of Resource1]"
  - name: "[Resource2]"
    description: "[Brief description of Resource2]"

paths:
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Create a new user account and receive access + refresh tokens.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticate with email and password to receive tokens.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Exchange a refresh token for a new access token.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Invalidate the current session.
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/AuthenticationError'

  # TODO: Add your domain resource endpoints here
