asyncapi: 2.6.0
info:
  title: "[Domain Name] Events"
  version: 1.0.0
  description: |
    > **Template placeholder.** Replace this file with your domain's AsyncAPI contract.
    > Run `task domain:init` to copy this template, then edit the copy in `docs/specifications/contracts/`.

    Domain event contract for the **[Domain Name]** domain.

    All events follow the [CloudEvents 1.0](https://cloudevents.io/) specification.
  contact:
    name: "[Your Name / Team]"
    email: "[your@email.com]"

servers:
  development:
    url: amqp://localhost:5672
    protocol: amqp
    description: Local RabbitMQ broker

defaultContentType: application/json

tags:
  - name: "[Resource1]"
    description: "Events related to [Resource1] lifecycle"

channels:
  # TODO: Replace with your domain's event channels
  # Pattern: [domain].[resource].[event]

  "[domain].[resource1].created":
    description: "Published when a new [resource1] is created."
    publish:
      operationId: on[Resource1]Created
      description: "Consume [resource1] created events."
      tags:
        - name: "[Resource1]"
      message:
        $ref: '#/components/messages/[Resource1]Created'

  "[domain].[resource1].updated":
    description: "Published when a [resource1] is updated."
    publish:
      operationId: on[Resource1]Updated
      description: "Consume [resource1] updated events."
      tags:
        - name: "[Resource1]"
      message:
        $ref: '#/components/messages/[Resource1]Updated'

components:
  messages:
    "[Resource1]Created":
      name: "[Resource1]Created"
      title: "[Resource1] Created"
      summary: "A new [resource1] has been created."
      contentType: application/json
      payload:
        $ref: '#/components/schemas/CloudEvent'
      examples:
        - name: example
          payload:
            specversion: "1.0"
            type: "[domain].[resource1].created"
            source: "/[domain]/[resource1]"
            id: "TODO-uuid"
            time: "2026-01-01T00:00:00Z"
            datacontenttype: application/json
            data:
              id: "TODO-uuid"
              # TODO: Add resource fields

    "[Resource1]Updated":
      name: "[Resource1]Updated"
      title: "[Resource1] Updated"
      summary: "A [resource1] has been updated."
      contentType: application/json
      payload:
        $ref: '#/components/schemas/CloudEvent'
      examples:
        - name: example
          payload:
            specversion: "1.0"
            type: "[domain].[resource1].updated"
            source: "/[domain]/[resource1]"
            id: "TODO-uuid"
            time: "2026-01-01T00:00:00Z"
            datacontenttype: application/json
            data:
              id: "TODO-uuid"
              # TODO: Add resource fields

  schemas:
    CloudEvent:
      type: object
      required: [specversion, type, source, id, time, datacontenttype, data]
      properties:
        specversion:
          type: string
          const: "1.0"
        type:
          type: string
          description: Event type in reverse-DNS notation
        source:
          type: string
          description: URI reference for the event source
        id:
          type: string
          format: uuid
        time:
          type: string
          format: date-time
        datacontenttype:
          type: string
          const: application/json
        data:
          type: object
          description: Event-specific payload
