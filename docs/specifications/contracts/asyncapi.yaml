asyncapi: 2.6.0
info:
  title: Items Domain Events
  version: 1.0.0
  description: |
    Domain event contract for the **Items** example domain.

    This is a deliberately simple domain included as a working reference
    implementation of the Domain API Template. Replace this file with
    your own domain's event contract.

    All events follow the [CloudEvents 1.0](https://cloudevents.io/) specification
    and are published over AMQP.
  contact:
    name: Domain API Template
    email: template@example.com

servers:
  development:
    url: amqp://localhost:5672
    protocol: amqp
    description: Local RabbitMQ broker

defaultContentType: application/json

tags:
  - name: Items
    description: Events related to item lifecycle (created, updated, deleted)

channels:
  items.item.created:
    description: Published whenever a new item is created by a contributor.
    publish:
      operationId: onItemCreated
      description: Consume item created events to react to new items being added to the catalogue.
      tags:
        - name: Items
      message:
        $ref: '#/components/messages/ItemCreated'

  items.item.updated:
    description: Published whenever an item's name, description, or status is changed.
    publish:
      operationId: onItemUpdated
      description: Consume item updated events to keep downstream systems in sync with item changes.
      tags:
        - name: Items
      message:
        $ref: '#/components/messages/ItemUpdated'

  items.item.deleted:
    description: Published whenever an item is deleted by its contributor.
    publish:
      operationId: onItemDeleted
      description: Consume item deleted events to remove references to items in downstream systems.
      tags:
        - name: Items
      message:
        $ref: '#/components/messages/ItemDeleted'

components:
  messages:
    ItemCreated:
      name: ItemCreated
      title: Item Created
      summary: A new item has been created.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ItemCreatedEvent'
      examples:
        - name: item-created-example
          payload:
            specversion: "1.0"
            type: items.item.created
            source: /items
            id: a1b2c3d4-0000-0000-0000-000000000001
            time: "2026-06-01T09:00:00Z"
            datacontenttype: application/json
            data:
              id: a1b2c3d4-0000-0000-0000-000000000002
              name: My First Item
              description: A great item
              status: active
              contributorId: a1b2c3d4-0000-0000-0000-000000000003
              createdAt: "2026-06-01T09:00:00Z"
              updatedAt: "2026-06-01T09:00:00Z"

    ItemUpdated:
      name: ItemUpdated
      title: Item Updated
      summary: An existing item has been updated.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ItemUpdatedEvent'
      examples:
        - name: item-updated-example
          payload:
            specversion: "1.0"
            type: items.item.updated
            source: /items
            id: a1b2c3d4-0000-0000-0000-000000000004
            time: "2026-06-02T10:00:00Z"
            datacontenttype: application/json
            data:
              id: a1b2c3d4-0000-0000-0000-000000000002
              name: My Updated Item
              description: An updated description
              status: archived
              contributorId: a1b2c3d4-0000-0000-0000-000000000003
              createdAt: "2026-06-01T09:00:00Z"
              updatedAt: "2026-06-02T10:00:00Z"

    ItemDeleted:
      name: ItemDeleted
      title: Item Deleted
      summary: An item has been deleted.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ItemDeletedEvent'
      examples:
        - name: item-deleted-example
          payload:
            specversion: "1.0"
            type: items.item.deleted
            source: /items
            id: a1b2c3d4-0000-0000-0000-000000000005
            time: "2026-06-03T11:00:00Z"
            datacontenttype: application/json
            data:
              id: a1b2c3d4-0000-0000-0000-000000000002
              contributorId: a1b2c3d4-0000-0000-0000-000000000003
              deletedAt: "2026-06-03T11:00:00Z"

  schemas:
    CloudEventBase:
      type: object
      required: [specversion, type, source, id, time, datacontenttype]
      properties:
        specversion:
          type: string
          const: "1.0"
        type:
          type: string
          description: Event type in reverse-DNS dot notation
        source:
          type: string
          description: URI reference for the event source
        id:
          type: string
          format: uuid
        time:
          type: string
          format: date-time
        datacontenttype:
          type: string
          const: application/json

    ItemData:
      type: object
      required: [id, name, description, status, contributorId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, archived]
        contributorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ItemCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/CloudEventBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ItemData'

    ItemUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/CloudEventBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ItemData'

    ItemDeletedEvent:
      allOf:
        - $ref: '#/components/schemas/CloudEventBase'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [id, contributorId, deletedAt]
              properties:
                id:
                  type: string
                  format: uuid
                contributorId:
                  type: string
                  format: uuid
                deletedAt:
                  type: string
                  format: date-time
