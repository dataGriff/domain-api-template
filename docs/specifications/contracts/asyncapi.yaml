      type: object
      description: |
        Payload for recurring walk paused, resumed, and cancelled events.
        Use the `type` field in the CloudEvents envelope to distinguish
        between `com.stardogwalker.recurring-walk.paused`,
        `com.stardogwalker.recurring-walk.resumed`, and
        `com.stardogwalker.recurring-walk.cancelled`.
      required:
        - id
        - ownerId
        - status
        - changedAt
      properties:
        id:
          type: string
          format: uuid
          example: c9d0e1f2-a3b4-5678-cdef-012345678901
        ownerId:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        status:
          type: string
          enum:
            - active
            - paused
            - cancelled
          description: New status of the recurring walk schedule
          example: paused
        changedAt:
          type: string
          format: date-time
          example: '2026-04-15T08:00:00Z'

