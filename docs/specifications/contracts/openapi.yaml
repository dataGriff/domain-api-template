    Invoice:
      type: object
      required:
        - id
        - ownerId
        - walkerId
        - lineItems
        - subtotal
        - taxRate
        - taxAmount
        - total
        - dueDate
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          example: ffee1122-3344-5566-7788-99aabbccddee
        invoiceNumber:
          type: string
          description: Human-readable invoice number
          example: INV-2025-0042
        ownerId:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        walkerId:
          type: string
          format: uuid
          example: 7b1e4d2a-1234-5678-abcd-ef0123456789
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
        subtotal:
          type: number
          format: float
          description: Sum of all line item totals before any tax
          example: 45.00
        taxRate:
          type: number
          format: float
          description: Tax rate applied as a percentage
          example: 0.00
        taxAmount:
          type: number
          format: float
          example: 0.00
        total:
          type: number
          format: float
          description: Total amount due including tax
          example: 45.00
        dueDate:
          type: string
          format: date
          example: '2025-04-30'
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        notes:
