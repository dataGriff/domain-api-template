        paidAt:
          type: string
          format: date-time
          nullable: true
          example: null
        paymentMethod:
          type: string
          nullable: true
          example: null
        paymentReference:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: '2025-04-16T09:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-04-16T09:00:00Z'

