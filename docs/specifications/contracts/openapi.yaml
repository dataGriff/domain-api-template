    InvoiceRequest:
      type: object
      required:
        - ownerId
        - walkerId
        - lineItems
        - dueDate
      properties:
        ownerId:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        walkerId:
          type: string
          format: uuid
          example: 7b1e4d2a-1234-5678-abcd-ef0123456789
        lineItems:
          type: array
          minItems: 1
          items:
