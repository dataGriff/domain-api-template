          description: Additional notes on the invoice
          example: Thank you for choosing Happy Paws Walking Service!

    InvoicePayment:
      type: object
      required:
        - paymentMethod
        - paidAt
      properties:
        paymentMethod:
          type: string
          enum:
            - bank_transfer
            - card
            - cash
            - other
          example: bank_transfer
        paidAt:
