apiVersion: v3.1.0
kind: DataContract
id: urn:datacontract:[domain]:[domain]-domain-events:1.0.0
name: "[Domain Name] Data Contract"
version: 1.0.0
status: draft
domain: "[domain]"

description:
  purpose: >
    TODO: Describe the purpose of this data contract.
    This contract is the authoritative historical integration point for
    downstream consumers of the [Domain Name] domain events.
  usage: >
    TODO: Describe how consumers should use this contract.
    Consume this contract to understand the schema of data emitted on the
